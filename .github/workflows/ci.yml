name: Continuous Integration

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: cherrybee_book_store
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_HOST: localhost
      DATABASE_NAME: cherrybee_book_store

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install

      - name: Seed database
        run: |
          psql -h 127.0.0.1 -U runner cherrybee_book_store -f seeds/books.sql
          psql -h 127.0.0.1 -U runner cherrybee_book_store -f seeds/users.sql

      - name: Start web app
        run: nohup python app.py > app.log 2>&1 &

      - name: Run tests
        run: |
          pytest
